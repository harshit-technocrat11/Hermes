services:
  postgres:
    image: postgres:17
    container_name: hermes-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hermes-redis
    restart: unless-stopped

    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    container_name: hermes-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: hermes-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/api/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=8000
    depends_on:
      - redis

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: hermes-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data: